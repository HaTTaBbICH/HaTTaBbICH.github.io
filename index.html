<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BEPJN4PE6N"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-BEPJN4PE6N');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SEO -->
    <title>CryptoCoin Widget – Bitcoin, Ethereum & Crypto Tracker</title>
    <meta name="description" content="Track Bitcoin, Ethereum, Solana in real time. Crypto widget with live prices and alerts.">
    <meta name="keywords" content="crypto widget, bitcoin tracker, ethereum price, solana">

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <!-- Icons -->
    <link rel="icon" href="icons/icon-32.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">

    <!-- OpenGraph -->
    <meta property="og:title" content="CryptoCoin Widget">
    <meta property="og:description" content="Live crypto prices widget">
    <meta property="og:image" content="app_icon.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- JSON-LD -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "MobileApplication",
      "name": "CryptoCoin Widget",
      "operatingSystem": "Android",
      "applicationCategory": "FinanceApplication"
    }
    </script>

    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            background: #0f172a url('bg.png') no-repeat center/cover fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            padding: 40px;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            text-align: center;
        }

        h1 {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-logo {
            width: 48px;
            margin-right: 10px;
        }

        .seo-text {
            font-size: 0.9em;
            margin: 15px 0;
        }

        .play-store img {
            width: 220px;
        }

        .live-ticker-box {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <img src="app_icon.png" class="app-logo" alt="App Icon">
        CryptoCoin Widget
    </h1>

    <p>Simple crypto price tracker</p>

    <p class="seo-text">
        Track BTC, ETH, SOL prices in real time with a lightweight widget.
    </p>

    <div class="play-store">
        <a href="https://play.google.com/store/apps/details?id=com.maksdev.cryptocoinwidget" target="_blank">
            <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png">
        </a>
    </div>
</div>

<div class="live-ticker-box">
    BTC: <span id="btc">...</span><br>
    ETH: <span id="eth">...</span><br>
    SOL: <span id="sol">...</span>
</div>

<script>
const ws = new WebSocket('wss://stream.binance.com:9443/stream?streams=btcusdt@trade/ethusdt@trade/solusdt@trade');

ws.onmessage = (e) => {
    const d = JSON.parse(e.data).data;
    const price = parseFloat(d.p).toFixed(2);

    if (d.s === 'BTCUSDT') document.getElementById('btc').innerText = price;
    if (d.s === 'ETHUSDT') document.getElementById('eth').innerText = price;
    if (d.s === 'SOLUSDT') document.getElementById('sol').innerText = price;
};

// SW
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
