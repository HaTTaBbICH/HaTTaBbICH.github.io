<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us – CryptoCoin Widget</title>
    <meta name="description" content="Contact the support team for CryptoCoin Widget. Telegram channel, support email, and privacy policy.">
    <meta name="keywords" content="crypto widget support, contact cryptocoin widget, android widget help">
    <link rel="icon" href="icon-32.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            background-image: url('bg.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-wrapper {
            width: 100%;
            max-width: 900px;
            margin: 80px 20px;
            display: flex;
            flex-direction: column;
        }

        .glass-panel {
            padding: 60px;
            background: rgba(255, 255, 255, 0.05);
            -webkit-backdrop-filter: blur(25px);
            backdrop-filter: blur(25px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 15px rgba(52, 152, 219, 0.1);
            border-radius: 32px;
            transition: all 0.4s ease;
            text-align: center;
        }

        .site-nav {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .site-nav a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1em;
            transition: all 0.2s;
        }
        
        .site-nav a:hover, .site-nav a.active {
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        h1 { font-size: 2.5em; font-weight: 700; margin-bottom: 40px; }
        
        .contact-content {
            text-align: left;
            max-width: 750px;
            margin: 0 auto;
        }

        .contact-list { list-style: none; padding: 0; margin: 0; }
        .contact-list li { 
            margin-bottom: 30px; 
            display: flex; 
            align-items: center; 
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .contact-list .icon { font-size: 2em; margin-right: 20px; line-height: 1; }
        .contact-link-text { color: #3498db; text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .contact-link-text:hover { color: #fff; text-decoration: underline; }
        .contact-label { font-weight: 600; color: rgba(255, 255, 255, 0.6); margin-right: 8px; }

        .live-ticker-box {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px 20px;
            border-radius: 20px; display: flex; flex-direction: column; gap: 8px; min-width: 170px;
        }
        .ticker-row { display: flex; justify-content: space-between; color: #fff; font-size: 0.95em; font-weight: 700; }
        .coin-info { display: flex; align-items: center; gap: 8px; }
        .live-indicator { width: 6px; height: 6px; background-color: #00ff00; border-radius: 50%; animation: pulse 2s infinite; }
        .price-value { transition: color 0.2s; font-variant-numeric: tabular-nums; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .language-switcher {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            display: flex; gap: 5px; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px);
            padding: 8px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .lang-btn {
            background: transparent; border: none; color: rgba(255, 255, 255, 0.5); padding: 5px 8px;
            cursor: pointer; font-size: 10px; font-weight: 700; border-radius: 6px; text-transform: uppercase;
        }
        .lang-btn.active { color: #fff; background: rgba(52, 152, 219, 0.4); }

        @media (max-width: 768px) {
            .glass-panel { padding: 30px; }
            h1 { font-size: 1.8em; }
            .language-switcher { top: 10px; left: 10px; }
            .live-ticker-box { top: auto; bottom: 20px; right: 10px; left: 10px; min-width: 0; }
            .main-wrapper { margin-top: 70px; margin-bottom: 120px; }
        }
    </style>
</head>
<body>

    <div class="language-switcher">
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ru">RU</button>
        <button class="lang-btn" data-lang="uk">UK</button>
    </div>

    <main class="main-wrapper">
        <div class="glass-panel">
            <nav class="site-nav">
                <a href="index.html" data-i18n="nav-home">Home</a>
                <a href="features.html" data-i18n="nav-features">Features</a>
                <a href="setup.html" data-i18n="nav-setup">How to Setup</a>
                <a href="faq.html" data-i18n="nav-faq">FAQ</a>
                <a href="contact.html" class="active" data-i18n="nav-contact">Contact</a>
            </nav>

            <h1 data-i18n="h1-contact">Support & Policy</h1>
            
            <div class="contact-content">
                <ul class="contact-list">
                    <li>
                        <span class="icon">📢</span>
                        <div class="text-group">
                            <span class="contact-label" data-i18n="label-tg">Telegram Channel: </span>                    
                            <a href="https://t.me/cryptocoinwidget" class="contact-link-text" target="_blank" data-i18n="link-tg">Follow us</a>
                        </div>
                    </li>
                    <li>
                        <span class="icon">✉️</span>
                        <div class="text-group">
                            <span class="contact-label" data-i18n="label-mail">Support Email: </span>
                            <a href="mailto:u58332353001243@gmail.com" class="contact-link-text">u58332353001243@gmail.com</a>
                        </div>
                    </li>
                    <li>
                        <span class="icon">🛡️</span>
                        <div class="text-group">
                            <span class="contact-label" data-i18n="label-privacy">Privacy Policy: </span>                  
                            <a href="https://www.iubenda.com/privacy-policy/24034645" class="contact-link-text" target="_blank" data-i18n="link-privacy">View our commitment</a>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </main>

    <div class="live-ticker-box">
        <div class="ticker-row">
            <div class="coin-info"><div class="live-indicator"></div><span style="color: #F7931A;">₿</span><span>BTC</span></div>
            <span id="price-btc" class="price-value"></span>
        </div>
        <div class="ticker-row">
            <div class="coin-info"><div class="live-indicator"></div><span style="color: #627EEA;">Ξ</span><span>ETH</span></div>
            <span id="price-eth" class="price-value"></span>
        </div>
        <div class="ticker-row">
            <div class="coin-info"><div class="live-indicator"></div><span style="color: #14F195;">◎</span><span>SOL</span></div>
            <span id="price-sol" class="price-value"></span>
        </div>
    </div>

    <script>
        const els = { 'BTCUSDT': document.getElementById('price-btc'), 'ETHUSDT': document.getElementById('price-eth'), 'SOLUSDT': document.getElementById('price-sol') };
        const lastPrices = { 'BTCUSDT': 0, 'ETHUSDT': 0, 'SOLUSDT': 0 };

        const translations = {
            en: {
                "nav-home": "Home", "nav-features": "Features", "nav-setup": "How to Setup", "nav-faq": "FAQ", "nav-contact": "Contact",
                "h1-contact": "Support & Policy",
                "label-tg": "Telegram Channel: ", "link-tg": "Follow us", "label-mail": "Support Email: ", "label-privacy": "Privacy Policy: ", "link-privacy": "View our commitment"
            },
            ru: {
                "nav-home": "Главная", "nav-features": "Возможности", "nav-setup": "Настройка", "nav-faq": "FAQ", "nav-contact": "Контакты",
                "h1-contact": "Поддержка и Политика",
                "label-tg": "Telegram канал: ", "link-tg": "Подписаться", "label-mail": "Email поддержки: ", "label-privacy": "Конфиденциальность: ", "link-privacy": "Наши обязательства"
            },
            uk: {
                "nav-home": "Головна", "nav-features": "Можливості", "nav-setup": "Налаштування", "nav-faq": "FAQ", "nav-contact": "Контакти",
                "h1-contact": "Підтримка та Політика",
                "label-tg": "Telegram канал: ", "link-tg": "Підписатися", "label-mail": "Email підтримки: ", "label-privacy": "Конфіденційність: ", "link-privacy": "Наші зобов'язання"
            }
        };

        function setLanguage(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[lang] && translations[lang][key]) el.innerHTML = translations[lang][key];
            });
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-lang') === lang));
            localStorage.setItem('appLang', lang);
        }

        const formatPrice = (p) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(p);

        async function loadInitialPrices() {
            const symbols = ['BTCUSDT', 'ETHUSDT', 'SOLUSDT'];
            try {
                const response = await fetch(`https://api.binance.com/api/v3/ticker/price?symbols=${JSON.stringify(symbols)}`);
                const data = await response.json();
                data.forEach(item => {
                    if (els[item.symbol]) {
                        els[item.symbol].innerText = formatPrice(item.price);
                        lastPrices[item.symbol] = parseFloat(item.price);
                    }
                });
            } catch (e) {}
        }

        const savedLang = localStorage.getItem('appLang') || 'en';
        setLanguage(savedLang);
        loadInitialPrices();

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang')));
        });

        const ws = new WebSocket('wss://stream.binance.com:9443/stream?streams=btcusdt@trade/ethusdt@trade/solusdt@trade');
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data).data;
            const symbol = data.s;
            const price = parseFloat(data.p);
            if (!els[symbol]) return;
            
            els[symbol].innerText = formatPrice(price);
            if (lastPrices[symbol] > 0) {
                els[symbol].style.color = price >= lastPrices[symbol] ? '#4caf50' : '#ff5252';
            }
            lastPrices[symbol] = price;
        };
    </script>
</body>
</html>
